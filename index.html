<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFitLife Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--acc:#c6a56b;--bg:#080807;--s1:#111110;--s2:#1a1a18;--bd:#2a2a27;--mu:#7a7567;--txt:#f0ece3;--txt2:#b8b2a7;--g:#59c7c0;--o:#ff8a5b;--r:12px}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px}
.login-logo span{color:var(--acc)}
.login-sub{font-size:12px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.fi{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--bd);background:var(--s2);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:10px}
.fi:focus{border-color:var(--acc)}
.bp{width:100%;padding:13px;border-radius:12px;border:none;background:var(--acc);color:#000;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px}
.err{color:#ff8866;font-size:13px;margin-bottom:10px;display:none}
#app{display:none}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hlogo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.hlogo span{color:var(--acc)}
.hsub{font-size:11px;color:var(--mu);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.hright{display:flex;align-items:center;gap:12px}
.badge{background:rgba(198,165,107,.1);border:1px solid rgba(198,165,107,.2);color:var(--acc);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.logout-btn{background:none;border:1px solid var(--bd);color:var(--mu);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif}
.main{padding:24px;max-width:1400px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:18px}
.stat-label{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-val{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1}
.stat-sub{font-size:11px;color:var(--mu);margin-top:4px}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:220px;padding:9px 13px;border-radius:9px;border:1.5px solid var(--bd);background:var(--s2);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:14px;outline:none}
.filter-btn{padding:8px 14px;border-radius:9px;border:1.5px solid var(--bd);background:none;color:var(--mu);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.filter-btn.on{border-color:var(--acc);color:var(--acc);background:rgba(198,165,107,.08)}
.table-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.table-hdr{display:grid;grid-template-columns:2fr 1.6fr 1fr 1fr 1fr 1fr 90px;gap:12px;padding:12px 16px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.table-row{display:grid;grid-template-columns:2fr 1.6fr 1fr 1fr 1fr 1fr 90px;gap:12px;padding:13px 16px;border-bottom:1px solid var(--bd);align-items:center}
.table-row:last-child{border:none}
.user-info .name{font-weight:600;font-size:14px}
.user-info .sub{font-size:12px;color:var(--mu);margin-top:2px}
.cell{font-size:13px;color:var(--txt2)}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
.pill.new{background:rgba(89,199,192,.1);color:var(--g);border:1px solid rgba(89,199,192,.2)}
.pill.confirmed{background:rgba(89,199,192,.1);color:var(--g);border:1px solid rgba(89,199,192,.2)}
.pill.pending{background:rgba(255,138,91,.12);color:var(--o);border:1px solid rgba(255,138,91,.2)}
.action-btn{background:none;border:1px solid var(--bd);color:var(--mu);padding:5px 10px;border-radius:7px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif}
.empty{text-align:center;padding:60px 20px;color:var(--mu)}
.loading{text-align:center;padding:40px;color:var(--mu);font-size:14px}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.mov.on{display:flex}
.mod{background:var(--s1);border:1px solid var(--bd);border-radius:20px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
.mod-tit{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.mod-close{background:none;border:none;color:var(--mu);cursor:pointer;font-size:20px;padding:0}
.mod-row{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px}
.mod-row:last-child{border:none}
.mod-label{color:var(--mu)}
.mod-val{font-weight:600;text-align:right;max-width:65%;word-break:break-word}
</style>
</head>
<body>
<div id="login">
  <div class="login-card">
    <div class="login-logo">My<span>FitLife</span></div>
    <div class="login-sub">Admin Panel</div>
    <div class="err" id="lerr"></div>
    <input class="fi" id="l-pw" type="password" placeholder="Password admin" autocomplete="current-password">
    <button class="bp" onclick="doLogin()">Accedi</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div>
      <div class="hlogo">My<span>FitLife</span> <span style="font-size:12px;color:var(--mu);font-family:'DM Sans',sans-serif;font-weight:400">Admin</span></div>
      <div class="hsub">Panoramica utenti</div>
    </div>
    <div class="hright">
      <div class="badge" id="total-badge">0 utenti</div>
      <button class="logout-btn" onclick="doLogout()">Esci</button>
    </div>
  </div>

  <div class="main">
    <div class="stats">
      <div class="stat-card"><div class="stat-label">Utenti totali</div><div class="stat-val" id="s-tot" style="color:var(--acc)">-</div><div class="stat-sub">in Authentication</div></div>
      <div class="stat-card"><div class="stat-label">Confermati</div><div class="stat-val" id="s-confirmed" style="color:var(--g)">-</div><div class="stat-sub">email confermata</div></div>
      <div class="stat-card"><div class="stat-label">Marketing</div><div class="stat-val" id="s-mkt" style="color:var(--g)">-</div><div class="stat-sub">consenso attivo</div></div>
      <div class="stat-card"><div class="stat-label">Workout totali</div><div class="stat-val" id="s-wkt" style="color:var(--acc)">-</div><div class="stat-sub">sessioni registrate</div></div>
    </div>

    <div class="toolbar">
      <input class="search" id="search" placeholder="Cerca per nome o email..." oninput="filterUsers()">
      <button class="filter-btn on" id="f-all" onclick="setFilter('all')">Tutti</button>
      <button class="filter-btn" id="f-confirmed" onclick="setFilter('confirmed')">Confermati</button>
      <button class="filter-btn" id="f-pending" onclick="setFilter('pending')">Non confermati</button>
      <button class="filter-btn" id="f-mkt" onclick="setFilter('mkt')">Marketing</button>
    </div>

    <div class="table-wrap">
      <div class="table-hdr">
        <span>Utente</span>
        <span>Email</span>
        <span>Creato</span>
        <span>Ultimo accesso</span>
        <span>Stato</span>
        <span>Workout</span>
        <span></span>
      </div>
      <div id="user-list"><div class="loading">Carico utenti...</div></div>
    </div>
  </div>
</div>

<div class="mov" id="mod-detail">
  <div class="mod">
    <div class="mod-tit">
      <span id="mod-nm">Dettaglio utente</span>
      <button class="mod-close" onclick="chiudiMod()">×</button>
    </div>
    <div id="mod-body"></div>
  </div>
</div>

<script>
var ADMIN_PW = '3003TERRY@';
var API_URL = 'https://app.myfitlife.it/api/chat';
var allUsers = [];
var currentFilter = 'all';

function doLogin() {
  var pw = document.getElementById('l-pw').value;
  if (pw !== ADMIN_PW) {
    var e = document.getElementById('lerr');
    e.textContent = 'Password errata.';
    e.style.display = 'block';
    return;
  }
  localStorage.setItem('mfl_admin_auth', '1');
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadUsers();
}

function doLogout() {
  localStorage.removeItem('mfl_admin_auth');
  location.reload();
}

document.getElementById('l-pw').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

if (localStorage.getItem('mfl_admin_auth') === '1') {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadUsers();
}

async function loadUsers() {
  try {
    var r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'admin',
        adminPw: ADMIN_PW
      })
    });

    var contentType = r.headers.get('content-type') || '';
    var txt = await r.text();

    if (!contentType.includes('application/json')) {
      throw new Error('Risposta non JSON: ' + txt.substring(0, 140));
    }

    var d = JSON.parse(txt);

    if (!r.ok || d.error) {
      throw new Error(d.error || 'Errore caricamento utenti');
    }

    allUsers = Array.isArray(d.users) ? d.users : [];
    renderStats();
    renderUsers(allUsers);

  } catch (e) {
    document.getElementById('user-list').innerHTML =
      '<div class="empty"><div style="font-size:36px;margin-bottom:10px">⚠️</div><p>Errore caricamento: ' + e.message + '</p></div>';
  }
}

function renderStats() {
  var tot = allUsers.length;
  var confirmed = allUsers.filter(function(u) { return !!u.email_confirmed_at; }).length;
  var mkt = allUsers.filter(function(u) { return !!u.marketing; }).length;
  var wktTot = allUsers.reduce(function(a, u) { return a + Number(u.workout_count || 0); }, 0);

  document.getElementById('s-tot').textContent = tot;
  document.getElementById('s-confirmed').textContent = confirmed;
  document.getElementById('s-mkt').textContent = mkt;
  document.getElementById('s-wkt').textContent = wktTot;
  document.getElementById('total-badge').textContent = tot + ' utenti';
}

function renderUsers(users) {
  if (!users.length) {
    document.getElementById('user-list').innerHTML =
      '<div class="empty"><div style="font-size:36px;margin-bottom:10px">👥</div><p>Nessun utente trovato.</p></div>';
    return;
  }

  var h = '';

  users.forEach(function(u) {
    var reg = u.created_at
      ? new Date(u.created_at).toLocaleDateString('it-IT', { day:'numeric', month:'short', year:'numeric' })
      : '-';

    var lastValue = u.last_login || u.last_sign_in_at;
    var last = lastValue
      ? new Date(lastValue).toLocaleDateString('it-IT', { day:'numeric', month:'short' })
      : '-';

    var isNew = u.created_at && ((new Date() - new Date(u.created_at)) / 86400000 <= 7);
    var nomeCompleto = ((u.nm || '') + ' ' + (u.cg || '')).trim();
    if (!nomeCompleto) nomeCompleto = '(senza profilo)';

    var stato = u.email_confirmed_at
      ? '<span class="pill confirmed">Confermato</span>'
      : '<span class="pill pending">Da confermare</span>';

    h += '<div class="table-row">';
    h += '<div class="user-info"><div class="name">' + escapeHtml(nomeCompleto) + (isNew ? ' <span class="pill new">Nuovo</span>' : '') + '</div><div class="sub">' + escapeHtml(u.email || '-') + '</div></div>';
    h += '<div class="cell" style="font-size:12px;word-break:break-all">' + escapeHtml(u.email || '-') + '</div>';
    h += '<div class="cell">' + reg + '</div>';
    h += '<div class="cell">' + last + '</div>';
    h += '<div class="cell">' + stato + '</div>';
    h += '<div class="cell">' + (u.workout_count || 0) + '</div>';
    h += '<div class="cell"><button class="action-btn" onclick="showDetail(\\'' + u.id + '\\')">Vedi</button></div>';
    h += '</div>';
  });

  document.getElementById('user-list').innerHTML = h;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.className = 'filter-btn'; });
  document.getElementById('f-' + f).className = 'filter-btn on';
  filterUsers();
}

function filterUsers() {
  var q = document.getElementById('search').value.toLowerCase();

  var filtered = allUsers.filter(function(u) {
    var nome = ((u.nm || '') + ' ' + (u.cg || '')).toLowerCase();
    var email = (u.email || '').toLowerCase();
    var match = !q || nome.includes(q) || email.includes(q);
    if (!match) return false;

    if (currentFilter === 'confirmed') return !!u.email_confirmed_at;
    if (currentFilter === 'pending') return !u.email_confirmed_at;
    if (currentFilter === 'mkt') return !!u.marketing;
    return true;
  });

  renderUsers(filtered);
}

function showDetail(id) {
  var u = allUsers.find(function(x) { return x.id === id; });
  if (!u) return;

  document.getElementById('mod-nm').textContent = (((u.nm || '') + ' ' + (u.cg || '')).trim() || 'Dettaglio utente');

  var rows = [
    ['ID', u.id || '-'],
    ['Email', u.email || '-'],
    ['Email confermata', u.email_confirmed_at ? 'Si' : 'No'],
    ['Creato il', u.created_at ? new Date(u.created_at).toLocaleString('it-IT') : '-'],
    ['Ultimo sign in', u.last_sign_in_at ? new Date(u.last_sign_in_at).toLocaleString('it-IT') : '-'],
    ['Ultimo login app', u.last_login ? new Date(u.last_login).toLocaleString('it-IT') : '-'],
    ['Nome', u.nm || '-'],
    ['Cognome', u.cg || '-'],
    ['Eta', u.et || '-'],
    ['Sesso', u.sx || '-'],
    ['Peso', u.ps ? (u.ps + ' kg') : '-'],
    ['Altezza', u.al ? (u.al + ' cm') : '-'],
    ['Obiettivo', u.ob || '-'],
    ['Lavoro', u.lav || '-'],
    ['Peso obiettivo', u.po ? (u.po + ' kg') : '-'],
    ['Marketing', u.marketing ? 'Si' : 'No'],
    ['Workout', u.workout_count || 0]
  ];

  document.getElementById('mod-body').innerHTML = rows.map(function(r) {
    return '<div class="mod-row"><span class="mod-label">' + escapeHtml(r[0]) + '</span><span class="mod-val">' + escapeHtml(String(r[1])) + '</span></div>';
  }).join('');

  document.getElementById('mod-detail').className = 'mov on';
}

function chiudiMod() {
  document.getElementById('mod-detail').className = 'mov';
}

document.getElementById('mod-detail').addEventListener('click', function(e) {
  if (e.target === this) chiudiMod();
});

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}
</script>
</body>
</html>
